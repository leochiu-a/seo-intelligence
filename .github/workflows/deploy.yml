name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @seo-intelligence/web build
        env:
          GITHUB_PAGES: true

      - name: Build docs
        run: pnpm --filter @seo-intelligence/docs build
        env:
          GITHUB_PAGES: true

      - name: Merge build artifacts
        run: |
          mkdir -p deploy/docs
          cp -r packages/web/dist/. deploy/
          cp -r docs/.vercel/output/static/. deploy/docs/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
